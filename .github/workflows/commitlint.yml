name: Commit Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint PR commits
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      - name: Lint push commits
        if: github.event_name == 'push'
        run: |
          FROM_SHA="${{ github.event.before }}"
          TO_SHA="${{ github.event.after }}"

          if [ "$FROM_SHA" = "0000000000000000000000000000000000000000" ]; then
            # First push to the branch — check only the latest commit
            FROM_SHA="HEAD~1"
          elif ! git cat-file -e "$FROM_SHA" 2>/dev/null; then
            # Force push: github.event.before is an orphaned commit no longer
            # reachable after checkout. We cannot reliably determine the push
            # range (origin/main already points to the new HEAD), so fall back
            # to checking only the tip commit.
            FROM_SHA="HEAD~1"
          fi

          npx commitlint --from "$FROM_SHA" --to "$TO_SHA"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | npx commitlint
