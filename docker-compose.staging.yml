services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ZizaLend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ZizaLend"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/${OWNER}/zizalend-backend:${TAG:-staging-latest}
    env_file:
      - ./backend/.env.staging
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/ZizaLend
      - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    image: ghcr.io/${OWNER}/zizalend-frontend:${TAG:-staging-latest}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://staging-api.example.com
      - API_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
